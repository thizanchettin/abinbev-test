bundle:
  name: abinbev-pipeline   # NOME DO BUNDLE
artifacts:
  abinbev_test:
    type: whl
    build: uv build
    path: .
variables:
  LAYER:
    default: "bronze"
targets:
  dev:
    variables:
      LAYER: bronze       # ← aqui definimos a variável: dev
    mode: development
    default: true
resources:
  jobs:
    runner_job:
      name: runner-job-${bundle.target}

      tasks:
        - task_key: run

          python_wheel_task:
            package_name: abinbev_test
            entry_point: runner:main

            parameters:
              - "--layer"
              - "${variables.LAYER}"

          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"

            dependencies:
              - ${artifacts.abinbev_test.files[0].remote_path}
